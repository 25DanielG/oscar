term: "202608" # format: YYYYMM

crns:
  - crn: "12345"
    label: "CS 3511 - Algorithms Honors"
  - crn: "67890"
    label: "CS 4400 - Database Systems"
  - crn: "11111"
    label: "ECE 2031 - Digital Design Lab"
    retry_on_restriction: true  # keep retrying silently when major-restricted

poll:
  base_interval: 20 # seconds between polls per CRN
  jitter: 10 # random seconds added to each interval, not below 10s total

cookies_path: "session.json"
db_path: "oscar.db"
log_dir: "logs"
dry_run: false # true runs pipeline without auto-registering